<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Galera Orchestrator v2 — MariaDB Galera Cluster Management" />
    <title>Galera Orchestrator</title>

    <!-- Preconnect for font performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Inter — clean sans-serif suitable for a technical admin panel -->
    <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
            rel="stylesheet"
    />

    <style>
        /* Critical inline reset — prevents FOUC before Vue mounts */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-family: 'Inter', system-ui, sans-serif; font-size: 16px; }
        body { background-color: #0f1117; color: #e2e8f0; min-height: 100dvh; }
        #app { min-height: 100dvh; }
    </style>
</head>
<body>
<div id="app"></div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
