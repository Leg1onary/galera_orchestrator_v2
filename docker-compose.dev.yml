# =============================================================================
# Galera Orchestrator v2 — DEV environment
# ONLY for local development and Phase 1 testing.
# NOT for production use.
#
# Services:
#   mariadb   — real MariaDB 10.11 (no Galera — wsrep vars will be empty/NULL)
#   sshd      — lightweight SSH server in the same network as mariadb
#               SSHClient connects here and can reach mariadb via hostname
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.dev.yml down -v   # also removes volumes
# =============================================================================

services:

  # ── MariaDB (target database for DBClient testing) ────────────────────────
  mariadb:
    image: mariadb:10.11
    container_name: galera-dev-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: testpass
      MARIADB_DATABASE: galera_test
    ports:
      # Expose on host for direct testing with mysql CLI
      - "13306:3306"
    volumes:
      - dev-mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--su-mysql", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - dev-net

  # ── SSHD (target for SSHClient testing) ───────────────────────────────────
  # lscr.io/linuxserver/openssh-server: minimal Alpine-based SSH server
  # Accepts the same key used by the orchestrator (SSH_KEY_PATH from .env.dev)
  sshd:
    image: lscr.io/linuxserver/openssh-server:latest
    container_name: galera-dev-sshd
    restart: unless-stopped
    environment:
      PUID: 0
      PGID: 0
      # The public key to authorize — content of your ~/.ssh/id_rsa.pub
      # Set in .env.dev as SSH_PUBLIC_KEY="ssh-rsa AAAA..."
      PUBLIC_KEY: ${SSH_PUBLIC_KEY}
      USER_NAME: root
      # Allow root login (needed for orchestrator SSH model per ТЗ раздел 3.2)
      SUDO_ACCESS: "true"
      PASSWORD_ACCESS: "false"
    ports:
      - "12222:2222"
    volumes:
      # Persist host keys so they don't change on restart (avoids known_hosts issues)
      - dev-sshd-config:/config
    networks:
      - dev-net
    # Wait for mariadb to be healthy before sshd starts
    # (not strictly required, but makes "docker compose up" output cleaner)
    depends_on:
      mariadb:
        condition: service_healthy

networks:
  dev-net:
    driver: bridge

volumes:
  dev-mariadb-data:
    driver: local
  dev-sshd-config:
    driver: local