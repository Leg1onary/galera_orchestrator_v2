# Galera Orchestrator v2
# Все переменные — в .env (cp .env.example .env)

services:
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile

    image: galera-orchestrator-v2:latest
    container_name: galera-orchestrator
    restart: unless-stopped

    ports:
      - "${HOST_PORT:-8000}:8000"

    volumes:
      # SQLite — named volume, переживает пересоздание контейнера
      - orchestrator-data:/data

      # SSH ключ — read-only bind mount (ТЗ раздел 3.2)
      # SEC-004: монтируем в директорию nonroot-пользователя
      - ${SSH_KEY_HOST_PATH:-~/.ssh/id_rsa}:/home/nonroot/.ssh/id_rsa:ro

    environment:
      # ── Database ────────────────────────────────────────────
      DATABASE_URL: ${DATABASE_URL:-sqlite:////data/orchestrator.db}

      # ── Auth ────────────────────────────────────────────────
      ADMIN_USERNAME:       ${ADMIN_USERNAME:-admin}
      # bcrypt-хеш пароля. Генерация:
      # python -c "import bcrypt; print(bcrypt.hashpw(b'yourpassword', bcrypt.gensalt()).decode())"
      ADMIN_PASSWORD_HASH:  ${ADMIN_PASSWORD_HASH}
      JWT_SECRET_KEY:       ${JWT_SECRET_KEY}

      # ── Cookie ──────────────────────────────────────────────
      # True в проде (за TLS-прокси), false только для локальной разработки без HTTPS
      COOKIE_SECURE: ${COOKIE_SECURE:-true}

      # ── Encryption ──────────────────────────────────────────
      # Генерация: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      FERNET_SECRET_KEY: ${FERNET_SECRET_KEY}

      # ── SSH ─────────────────────────────────────────────────
      # SEC-004: путь обновлён под nonroot-пользователя
      SSH_KEY_PATH: /home/nonroot/.ssh/id_rsa

      # ── App ───────────────────────────────────────────────────
      # false — выключает /docs, /redoc, /openapi.json в проде (default)
      # true  — включить только для локальной разработки
      DOCS_ENABLED: ${DOCS_ENABLED:-false}

      # ── Timeouts (sec) ──────────────────────────────────────
      SSH_CONNECT_TIMEOUT:  ${SSH_CONNECT_TIMEOUT:-5}
      SSH_COMMAND_TIMEOUT:  ${SSH_COMMAND_TIMEOUT:-10}
      DB_CONNECT_TIMEOUT:   ${DB_CONNECT_TIMEOUT:-3}

    healthcheck:
      test: >
        curl -sf -o /dev/null -w "%{http_code}"
        http://localhost:8000/api/auth/me | grep -qE "^(200|401)$$"
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  orchestrator-data:
    driver: local
