# Galera Orchestrator v2
# Все переменные — в .env (cp .env.example .env)

services:
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile

    image: galera-orchestrator-v2:latest
    container_name: galera-orchestrator
    restart: unless-stopped

    ports:
      - "${HOST_PORT:-8000}:8000"

    volumes:
      # SQLite — named volume, переживает пересоздание контейнера
      - orchestrator-data:/data

      # SSH ключ — read-only bind mount (ТЗ раздел 3.2)
      # Путь на хосте задаётся через SSH_KEY_HOST_PATH в .env
      - ${SSH_KEY_HOST_PATH:-~/.ssh/id_rsa}:/root/.ssh/id_rsa:ro

    environment:
      # ── Database ────────────────────────────────────────────
      DATABASE_URL: ${DATABASE_URL:-sqlite:////data/orchestrator.db}

      # ── Auth ────────────────────────────────────────────────
      ADMIN_USERNAME:  ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD:  ${ADMIN_PASSWORD:-changeme}
      JWT_SECRET_KEY:  ${JWT_SECRET_KEY:-change-me-jwt-secret-min-32-chars}

      # ── Encryption ──────────────────────────────────────────
      # Генерация: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      FERNET_SECRET_KEY: ${FERNET_SECRET_KEY:-change-me-fernet-key}

      # ── SSH ─────────────────────────────────────────────────
      # Путь внутри контейнера (должен совпадать с target bind mount выше)
      SSH_KEY_PATH: /root/.ssh/id_rsa

      # ── Timeouts (sec) ──────────────────────────────────────
      SSH_CONNECT_TIMEOUT:  ${SSH_CONNECT_TIMEOUT:-5}
      SSH_COMMAND_TIMEOUT:  ${SSH_COMMAND_TIMEOUT:-10}
      DB_CONNECT_TIMEOUT:   ${DB_CONNECT_TIMEOUT:-3}

    healthcheck:
      test: >
        curl -sf -o /dev/null -w "%{http_code}"
        http://localhost:8000/api/auth/me | grep -qE "^(200|401)$$"
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  orchestrator-data:
    driver: local