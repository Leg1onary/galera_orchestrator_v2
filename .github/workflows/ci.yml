name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  # ── Backend lint + smoke test ────────────────────────────────────
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install ruff httpx pytest pytest-asyncio

      - name: Lint (ruff)
        run: ruff check backend/ --ignore E501,E402

      - name: Smoke test — config import
        run: |
          cd backend
          python3 -c "
          from config import load_config
          from auth import init_auth
          from mock_data import node_status, mock_garbd_status, set_scenario
          print('Backend imports: OK')
          "

      - name: Smoke test — API health
        run: |
          cd backend
          # Copy example config so it starts cleanly
          cp ../config/nodes.example.yaml ../config/nodes.yaml
          uvicorn main:app --host 127.0.0.1 --port 18000 &
          sleep 5
          curl -sf http://127.0.0.1:18000/api/health | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['ok'], d"
          echo "Health check: OK"

  # ── Frontend build ────────────────────────────────────────────────
  frontend:
    name: Frontend (Vue 3 + Vite)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: cd frontend && npm install

      - name: Build
        run: cd frontend && npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: backend/static/
          retention-days: 7

  # ── Docker build ──────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: galera-orchestrator-v2:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
